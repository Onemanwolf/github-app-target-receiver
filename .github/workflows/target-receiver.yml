name: Target - Cross-Repo Receiver

# Stamp the run name with the correlation id (when present) so the synchronous
# source workflow can find exactly this run while polling. Falls back to the
# default name for the async path and manual triggers.
run-name: >-
  ${{ (github.event_name == 'repository_dispatch' && github.event.client_payload.correlation_id)
      && format('Receiver · cid={0}', github.event.client_payload.correlation_id)
      || 'Target - Cross-Repo Receiver' }}

on:
  # Receive repository_dispatch events from source repo
  repository_dispatch:
    types: [cross-repo-trigger]

  # Also allow manual trigger for comparison
  workflow_dispatch:
    inputs:
      message:
        description: 'Manual trigger message'
        required: false
        default: 'Manual trigger'

permissions:
  contents: read

jobs:
  process-trigger:
    runs-on: ubuntu-latest
    name: Process Trigger

    steps:
      - name: Display trigger information
        id: info
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║  Cross-Repo Trigger Received!            ║"
          echo "╚══════════════════════════════════════════╝"
          echo ""
          echo "Trigger Type: ${{ github.event_name }}"

      - name: Print client payload (safe object rendering)
        if: github.event_name == 'repository_dispatch'
        run: |
          echo "─── Client Payload ───"
          echo "${{ toJSON(github.event.client_payload) }}"

      - name: Process the trigger
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            MESSAGE="${{ github.event.client_payload.message }}"
            SOURCE_REPO="${{ github.event.client_payload.source_repo }}"
            SOURCE_REF="${{ github.event.client_payload.source_ref }}"
            TRIGGERED_BY="${{ github.event.client_payload.triggered_by }}"
            TIMESTAMP="${{ github.event.client_payload.timestamp }}"

            echo "📨 Processing cross-repo trigger..."
            echo "   Message: $MESSAGE"
            echo "   Source: $SOURCE_REPO"
            echo "   Ref: $SOURCE_REF"
            echo "   Triggered by: $TRIGGERED_BY"
            echo "   Time: $TIMESTAMP"

            # Log to a temp file in the runner workspace (persists within the job)
            echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") | Triggered by: $TRIGGERED_BY | Message: $MESSAGE | Source: $SOURCE_REPO" > $RUNNER_TEMP/trigger-log.txt
            echo "📝 Trigger info saved to temp log"
          else
            echo "📨 Processing manual trigger..."
            echo "   Message: ${{ github.event.inputs.message }}"
          fi

      - name: Resolve container name and write result
        id: deploy
        run: |
          # Inputs sent down by the source trigger (defaults if absent)
          CONTAINER_NAME="${{ github.event.client_payload.container_name }}"
          IMAGE_TAG="${{ github.event.client_payload.image_tag }}"
          [ -z "$CONTAINER_NAME" ] && CONTAINER_NAME="app"
          [ -z "$IMAGE_TAG" ] && IMAGE_TAG="latest"

          # "Deploy" — derive the resolved container name this run produced
          DEPLOYED_CONTAINER="${CONTAINER_NAME}-${IMAGE_TAG}-run${{ github.run_number }}"
          echo "🚀 Deployed container: $DEPLOYED_CONTAINER"

          # Write a structured result the source will read back
          cat > "$RUNNER_TEMP/result.json" <<EOF
          {
            "status": "deployed",
            "container_name": "$DEPLOYED_CONTAINER",
            "image_tag": "$IMAGE_TAG",
            "receiver_run_id": ${{ github.run_id }},
            "receiver_run_number": ${{ github.run_number }}
          }
          EOF
          echo "container_name=$DEPLOYED_CONTAINER" >> "$GITHUB_OUTPUT"
          echo "--- result.json ---"; cat "$RUNNER_TEMP/result.json"

      - name: Upload result artifact (source downloads this)
        uses: actions/upload-artifact@v4
        with:
          name: cross-repo-result
          path: ${{ runner.temp }}/result.json
          retention-days: 1

      - name: Show results
        if: success()
        run: |
          echo ""
          echo "✅ Trigger processing completed successfully"
          echo "📦 Container produced: ${{ steps.deploy.outputs.container_name }}"
